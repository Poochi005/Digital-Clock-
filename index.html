<!DOCTYPE html>
<html>

<head>
    <title>Digital Clock</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <div class="left">

            <h1 id="digitalClock">00:00:00</h1>

            <h2 id="location">Selaiyu, Tamil Nadu</h2>

            <p id="date"></p>

        </div>

        <div class="right">

            <canvas id="clock" width="220" height="220"></canvas>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
